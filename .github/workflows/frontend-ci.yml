name: Frontend CI

on:
  push:
    paths:
      - 'firmador-frontend/**'
  pull_request:
    paths:
      - 'firmador-frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        working-directory: firmador-frontend
        run: npm ci

      - name: Build frontend
        working-directory: firmador-frontend
        run: npm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: firmador-frontend/dist
