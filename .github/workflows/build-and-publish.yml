name: Build and Publish

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn clean install -f pom-parent.xml
    
    - name: Run tests
      run: mvn test -f pom-parent.xml
    
    - name: Upload Core Library
      uses: actions/upload-artifact@v3
      with:
        name: firmador-core-${{ github.sha }}
        path: firmador-core/target/firmador-core-*.jar
        retention-days: 30
    
    - name: Upload GUI Application
      uses: actions/upload-artifact@v3
      with:
        name: firmador-gui-${{ github.sha }}
        path: firmador-gui/target/firmador.jar
        retention-days: 30
    
    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Maven Tests
        path: '**/target/surefire-reports/*.xml'
        reporter: java-junit

  publish-github-packages:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Configure Maven settings
      uses: s4u/maven-settings-action@v2.8.0
      with:
        servers: |
          [{
            "id": "github",
            "username": "${{ github.actor }}",
            "password": "${{ secrets.GITHUB_TOKEN }}"
          }]
    
    - name: Publish to GitHub Packages
      run: mvn deploy -f pom-parent.xml -DskipTests=true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Cache SonarCloud packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    
    - name: Build and analyze
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn clean verify -f pom-parent.xml
        # Uncomment when SonarCloud is configured
        # mvn sonar:sonar -Dsonar.projectKey=YOUR_PROJECT_KEY

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Run OWASP Dependency Check
      run: mvn org.owasp:dependency-check-maven:check -f pom-parent.xml
      continue-on-error: true
    
    - name: Upload OWASP report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: owasp-report
        path: '**/target/dependency-check-report.html'
        retention-days: 30

  create-release-artifacts:
    name: Create Release Artifacts
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Build release artifacts
      run: mvn clean package -f pom-parent.xml -DskipTests=true
    
    - name: Create distribution package
      run: |
        mkdir -p dist
        cp firmador-core/target/firmador-core-*.jar dist/
        cp firmador-gui/target/firmador.jar dist/
        cp firmador-core/README.md dist/README-LIBRARY.md
        cp BUILD.md dist/
        cp COPYING dist/
        cd dist
        zip -r ../firmador-${{ github.event.release.tag_name }}.zip .
        tar -czf ../firmador-${{ github.event.release.tag_name }}.tar.gz .
    
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          firmador-${{ github.event.release.tag_name }}.zip
          firmador-${{ github.event.release.tag_name }}.tar.gz
          firmador-core/target/firmador-core-*.jar
          firmador-gui/target/firmador.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

