spring:
  application:
    name: firmador-backend
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://db.scsekucswnfeocsklqvz.supabase.co:5432/postgres}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:Bazinga1342}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
